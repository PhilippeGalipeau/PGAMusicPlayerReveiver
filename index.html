<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PGA Music Receiver</title>

    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* BARRE DE PROGRESSION */
        #progressContainer {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            height: 24px;
            background: rgba(80,80,80,0.8);
            border-radius: 12px;
            overflow: hidden;
            z-index: 9999;
            pointer-events: none;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #00ff90;
            transition: width 0.5s linear;
        }

        /* DEBUG PANEL */

        #debug {
            position: fixed;
            bottom: 50px;
            left: 0;
            width: 100%;
            height: 40%;
            overflow-y: auto;
            background: rgba(0,0,0,0.85);
            color: #00ff90;
            font-size: 14px;
            font-family: monospace;
            padding: 8px;
            box-sizing: border-box;
            z-index: 10000;
        }

    </style>
</head>

<body>

<cast-media-player></cast-media-player>

<div id="progressContainer">
    <div id="progress"></div>
</div>

<div id="debug"></div>

<script>

    // -----------------------------
    // DEBUG SYSTEM (SAFE)
    // -----------------------------

    const debugEl = document.getElementById("debug");

    function debug(msg) {


        const line = document.createElement("div");
        line.textContent = msg;
        debugEl.appendChild(line);
        debugEl.scrollTop = debugEl.scrollHeight;

        while (debugEl.childNodes.length > 200) {
            debugEl.removeChild(debugEl.firstChild);
        }


    }

    console.log = function (...args) {
        debug(args.map(a =>
            typeof a === "object" ? JSON.stringify(a) : a
        ).join(" "));
    };

    console.error = function (...args) {
        debug("❌ " + args.join(" "));
    };

    window.onerror = function (message, source, lineno, colno) {
        debug("🔥 JS ERROR: " + message + " (" + lineno + ":" + colno + ")");
    };

    window.addEventListener("unhandledrejection", function (event) {
        debug("🔥 PROMISE ERROR: " + event.reason);
    });

    // -----------------------------
    // BOOT TEST
    // -----------------------------

    debug("PGA_BOOT_START");

    try {

        if (!window.cast || !cast.framework) {
            debug("❌ CAST SDK NOT LOADED");
            throw new Error("Cast SDK missing");
        }

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        debug("CAST SDK OK");
        debug(
            "getCurrentTime = " +
            typeof playerManager.getCurrentTime
        );

        debug(
            "getMediaStatus = " +
            typeof playerManager.getMediaStatus
        );

        debug(
            "getMediaInformation = " +
            typeof playerManager.getMediaInformation
        );

        /*
        debug("PLAYER_STATE_CHANGED = " +
            cast.framework.events?.EventType?.PLAYER_STATE_CHANGED);

        debug("ERROR = " +
            cast.framework.events?.EventType?.ERROR);

        debug("LOAD EVENT exists = " +
            ("LOAD" in cast.framework.messages.MessageType));
        */

        // -----------------------------
        // LOAD INTERCEPTOR
        // -----------------------------

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {

                debug("LOAD RECEIVED");
/*
                if (request.media?.customData) {
                    debug("CUSTOM DATA: " +
                        JSON.stringify(request.media.customData));
                }
*/
                request.autoplay = true;

                return request;
            }
        );

        // -----------------------------
        // PLAYER STATE DEBUG
        // -----------------------------

        /*
        playerManager.addEventListener(
            cast.framework.events.EventType.ALL,
            e => {
                debug("EVENT: " + e.type);
            }
        );
        */

        let mediaDuration = 0;

        playerManager.addEventListener(
            cast.framework.events.EventType.MEDIA_INFORMATION_CHANGED,
            (event) => {

                if (event.mediaInformation &&
                    event.mediaInformation.duration) {

                    mediaDuration =
                        event.mediaInformation.duration;

                    debug("DURATION = " + mediaDuration);
                }
            }
        );

        // -----------------------------
        // PROGRESS BAR
        // -----------------------------

        const progress = document.getElementById("progress");

        setInterval(() => {

            try {

                const currentTime =
                    playerManager.getCurrentTime
                    ? playerManager.getCurrentTime()
                    : 0;

                if (mediaDuration > 0) {

                    const percent =
                        (currentTime / mediaDuration) * 100;

                    progress.style.width =
                        Math.min(100, percent) + "%";
                }

            } catch (e) {

                debug("Progress Error: " + e.message);

            }

        }, 1000);

        // -----------------------------
        // START RECEIVER
        // -----------------------------

        const options =
            new cast.framework.CastReceiverOptions();

        options.maxInactivity = 3600;
        options.disableIdleTimeout = true;

        context.start(options);

        debug("RECEIVER STARTED");

    }
    catch (e) {

        debug("FATAL ERROR: " + e.message);

    }

</script>

</body>
</html>

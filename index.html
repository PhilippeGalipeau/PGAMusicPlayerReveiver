<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PGA Music Player Receiver</title>

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // -------------------------
        // DEBUG (SAFE)
        // -------------------------
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_STATE_CHANGED,
            e => console.log("[STATE]", e.playerState)
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.ERROR,
            e => console.error("[ERROR]", e)
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.LOAD,
            e => console.log("[LOAD]", e?.media?.customData)
        );

        // -------------------------
        // LOAD INTERCEPTOR (SAFE ONLY)
        // -------------------------
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {

                console.log("[LOAD REQUEST]", request?.media?.customData);

                request.autoplay = true;

                return request;
            }
        );

        // -------------------------
        // VISIBILITY ONLY (NO DOM HACK)
        // -------------------------
        document.addEventListener("visibilitychange", () => {
            if (!document.hidden) {
                console.log("[FOREGROUND] receiver active again");
            }
        });

        // -------------------------
        // OPTIONS (SAFE MINIMAL)
        // -------------------------
        const options = new cast.framework.CastReceiverOptions();
        options.maxInactivity = 3600;

        context.start(options);

        console.log("[CAST] Receiver started");
    </script>
</body>
</html>

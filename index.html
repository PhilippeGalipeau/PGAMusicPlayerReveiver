<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PGA Music Player Receiver</title>

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // -----------------------------
        // LOGGING (CRITICAL DEBUGGING)
        // -----------------------------
        playerManager.addEventListener(
            cast.framework.events.EventType.LOAD,
            e => console.log("LOAD:", e)
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_STATE_CHANGED,
            e => console.log("STATE:", e)
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.ERROR,
            e => console.error("ERROR:", e)
        );

        // -----------------------------
        // LOAD INTERCEPTOR
        // -----------------------------
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {

                if (request.media?.customData) {
                    console.log("CustomData received:", request.media.customData);
                }

                // IMPORTANT: force autoplay stability
                request.autoplay = true;

                return request;
            }
        );

        // -----------------------------
        // OPTIONS (FIXED)
        // -----------------------------
        const options = new cast.framework.CastReceiverOptions();

        // IMPORTANT: keep alive behavior
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600;

        // IMPORTANT: avoids premature teardown on audio-only or low UI activity
        options.skipPlayersLoad = false;

        // -----------------------------
        // START
        // -----------------------------
        context.start(options);

        console.log("Cast Receiver started");
    </script>
</body>
</html>

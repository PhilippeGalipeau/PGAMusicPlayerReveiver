<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PGA Music Player Receiver</title>

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
        }

        cast-media-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        try {
            const context = cast.framework.CastReceiverContext.getInstance();
            const playerManager = context.getPlayerManager();

            // SAFE interceptor only
            playerManager.setMessageInterceptor(
                cast.framework.messages.MessageType.LOAD,
                request => {
                    console.log("LOAD:", request?.media?.customData);
                    request.autoplay = true;
                    return request;
                }
            );

            const options = new cast.framework.CastReceiverOptions();

            options.maxInactivity = 3600;

            // IMPORTANT: ne PAS mettre disableIdleTimeout
            // options.disableIdleTimeout = true; ❌ REMOVE

            context.start(options);

            console.log("Receiver started OK");

        } catch (e) {
            console.error("Receiver crash:", e);
        }
    </script>
</body>
</html>
